apiVersion: apps/v1
kind: Deployment
metadata:
  name: tetris-stable
  namespace: default
spec:
  replicas: 5
  selector:
    matchLabels:
      app: tetris-stable
  template:
    metadata:
      labels:
        app: tetris-stable  # Pod label
        version: v2
    spec:
      containers:
      - name: tetris
        image: surendrak17/tetrisv1:2
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: tetris-service
  namespace: default
spec:
  selector:
    app: tetris-stable  # ← FIXED! Matches stable pods
  type: NodePort
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    nodePort: 30915
